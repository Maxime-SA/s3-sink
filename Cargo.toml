[package]
name = "s3-sink"
version = "0.1.0"
authors = ["Maxime St-Onge Amoretti"]
description = "A single-threaded asynchronous Rust-based Kafka S3 Sink"
edition = "2024"

[dependencies]
aws-config = "1.8.17"
aws-msk-iam-sasl-signer = "1.0.1"
aws-sdk-s3 = "1.132.0"
chrono = "0.4.44"
futures = "0.3.32"
rdkafka = "0.39.0"
tokio = { version = "1.52.3", features = ["macros", "rt", "time", "test-util"]}
tracing = "0.1.44"
tracing-subscriber = "0.3.23"
uuid = {version = "1.23.1", features = ["v4"] }
zstd = "0.13.3"
