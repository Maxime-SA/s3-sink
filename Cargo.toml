[package]
name = "kafka-sink"
version = "0.1.0"
authors = ["Maxime St-Onge Amoretti"]
description = "A Kafka sink implementation in Rust"
edition = "2024"

[dependencies]
iceberg = "0.9.1"
rdkafka = "0.39.0"
schema-registry-client = "0.4.2"

[[bin]]
name = "iceberg-sink"
path = "src/bin/iceberg-sink.rs"

[[bin]]
name = "s3-sink"
path = "src/bin/s3-sink.rs"